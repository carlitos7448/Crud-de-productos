<div class="lista">

<h2>Productos</h2>

<div



*ngIf="productoService.obtenerProductos().lengt == 0">

no hay productos para mostrar

</div>

<div

class=" card "
*ngFor="let producto of productService.obtenerProductos()">

<h3>{{ producto.nombre }}</h3>
<p>${{ producto.precio}}</p>

<button

(click)="productoService.eliminarProducto(producto.id)">

    eliminarProducto

</button>


</div>









</div>
